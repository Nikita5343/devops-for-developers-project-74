services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    working_dir: /root
    ports:
      - "8080:8080"
    command: make dev

  webserver:
    image: caddy:2.6-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ${PWD}/Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - app

volumes:
  caddy_data:
  caddy_config:
