services:
  app:
    environment:
      DATABASE_USERNAME: postgres           
      DATABASE_NAME: postgres
      DATABASE_PASSWORD: sqlpostgres
      DATABASE_HOST: db
    build:
      context: .
      dockerfile: Dockerfile.production
    command: npm test
    image: voitov/devops-for-developers-project-74:latest
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:latest  # Это PG 18+
    restart: unless-stopped
    environment:           
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: sqlpostgres
      POSTGRES_DB: my_db
    volumes:
      - postgres_data:/var/lib/postgresql  # ✅ ИСПРАВЛЕНО: без /data!
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data: {}  # ✅ ПРАВИЛЬНО: верхний уровень
