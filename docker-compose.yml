services:
  app:
    image: voitov/devops-for-developers-project-74:latest
    container_name: app-1
    expose:
      - "8080"
    networks:
      - devnet
    depends_on:
      db:
        condition: service_healthy  # ✅ Отлично!

  db:
    image: postgres:latest
    restart: unless-stopped
    environment:           
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: sqlpostgres
      POSTGRES_DB: my_db
    # env_file: .env  ← ❌ УДАЛИТЬ для CI!
    ports:
      - "5455:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]  # ← Жёстко "postgres"!
      interval: 5s
      timeout: 5s
      retries: 5

  webserver:
    image: caddy:2.6-alpine
    container_name: webserver-1
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
    depends_on:
      - app
    networks:
      - devnet

networks:
  devnet:

volumes:
  - postgres_data:/var/lib/postgresql
