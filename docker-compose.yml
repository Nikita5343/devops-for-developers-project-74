services:
  app:
    image: voitov/devops-for-developers-project-74:latest
    container_name: app-1
    expose:
      - "8080"
    networks:
      - devnet
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:latest  # Это PG 18+
    restart: unless-stopped
    environment:           
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: sqlpostgres
      POSTGRES_DB: my_db
    ports:
      - "5455:5432"
    volumes:
      - postgres_data:/var/lib/postgresql  # ✅ ИСПРАВЛЕНО: без /data!
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  caddy:
    image: caddy:2.6-alpine
    container_name: webserver-1
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
    depends_on:
      - app
    networks:
      - devnet

networks:
  devnet:

volumes:
  postgres_data: {}  # ✅ ПРАВИЛЬНО: верхний уровень
